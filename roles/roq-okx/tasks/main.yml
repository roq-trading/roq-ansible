---

- name: combine user configuration with defaults
  set_fact:
    roq_okx_config: >
        {{ roq_okx_defaults | combine(roq_okx | default({}), recursive=True) }}
    cacheable: true
  tags:
    - always

- block:

  - name: shorter variable name for config
    set_fact:
      config: "{{ roq_okx_config }}"

  - name: install
    include_role:
      name: common
      tasks_from: gateway

  when: "'roq_okx' in group_names"
  tags:
    - roq-okx
