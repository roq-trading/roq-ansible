---

roq_pubsub_defaults:
  version: "{{ roq_version }}"
  docker:
    use: "{{ roq_use_docker }}"
    name: "roqtrading/roq-pubsub"
  service:
    start: "Sun *-*-* 00:01:00"
    stop: "Sat *-*-* 23:59:00"
  logging:
    verbosity: 0
  flags:
    name: "pubsub"
    config_file: "{{ directory_config.usr_local_etc }}/roq-pubsub/config.toml"
    event_log_dir: "{{ directory_config.var_lib }}/roq/data"
    client_listen_address: "{{ directory_config.run }}/roq/roq-pubsub.sock"
    metrics_listen_address: "{{ directory_config.run }}/roq/metrics/roq-pubsub.sock"
  symbols:
    - ".*"
