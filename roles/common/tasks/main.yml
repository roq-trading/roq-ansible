---
- name: Common
  tags:
    - common
  become: '{{ config_systemd.scope == "system" }}'
  block:
    - name: Create required directories (default access)
      ansible.builtin.file:
        path: '{{ item }}'
        state: directory
        mode: 0755
      with_items:
        - '{{ config_user.conda_dir }}'
      # XXX FIXME TODO when config_roq.services non-empty
    - name: Create required directories (default access)
      ansible.builtin.file:
        path: '{{ item }}'
        state: directory
        mode: 0755
      with_items:
        - '{{ config_user.systemd_unit_dir }}'
      when: config_systemd.scope == "user"
    - name: Create required directories (user access)
      ansible.builtin.file:
        path: '{{ item }}'
        state: directory
        mode: 0755
        owner: '{{ ansible_user }}'
        group: '{{ ansible_user }}'
      with_items:
        - '{{ config_user.run_dir }}/client'
        - '{{ config_user.run_dir }}/service'
        - '{{ config_user.config_dir }}'
        - '{{ config_user.config_dir }}/shared'
        - '{{ config_user.cache_dir }}'
        - '{{ config_user.data_dir }}'
      # XXX FIXME TODO when config_roq.services non-empty
    - name: Create auth-keys file (user access)
      ansible.builtin.template:
        src: templates/keys.json
        dest: '{{ config_user.config_dir }}/shared/keys.json'
        mode: 0644
        owner: '{{ ansible_user }}'
        group: '{{ ansible_user }}'
      # XXX FIXME TODO when config_roq.services non-empty
    - name: Create shared flags
      ansible.builtin.template:
        src: templates/flags.cfg
        dest: '{{ config_user.config_dir }}/shared/{{ item.key }}.cfg'
        mode: 0644
        owner: '{{ "root" if config_systemd.scope == "system" else ansible_user }}'
        group: '{{ "root" if config_systemd.scope == "system" else ansible_user }}'
      with_items: '{{ config_roq.flags | dict2items }}'
      # XXX FIXME TODO when config_roq.services non-empty
