---

roq_bybit_defaults:
  version: "{{ roq_version }}"
  docker:
    use: "{{ roq_use_docker }}"
    name: "roqtrading/roq-bybit"
  service:
    start: "Sun *-*-* 00:01:00"
    stop: "Sat *-*-* 23:59:00"
  logging:
    verbosity: 0
  flags:
    name: "bitfinex"
    config_file: "{{ directory_config.usr_local_etc }}/roq-bitfinex/config.toml"
    event_log_dir: "{{ directory_config.var_lib }}/roq/data"
    client_listen_address: "{{ directory_config.run }}/roq/roq-bitfinex.sock"
    metrics_listen_address: "{{ directory_config.run }}/roq/metrics/roq-bitfinex.sock"
    auth_keys_file: "{{ directory_config.usr_local_etc }}/roq/keys.json"
    auth_cache_dir: "{{ directory_config.var_lib }}"
    rest_uri: "https://api-testnet.bitfinex.com"
    ws_public_uri: "wss://stream-testnet.bitfinex.com/spot/quote/ws/v2"
    ws_private_uri: "wss://stream-testnet.bitfinex.com/spot/ws"
  symbols:
    - ".*"
