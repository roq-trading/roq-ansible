---

- name: combine user configuration with defaults
  set_fact:
    roq_bitfinex_config: >
        {{ roq_bitfinex_defaults | combine(roq_bitfinex | default({}), recursive=True) }}
    cacheable: true
  tags:
    - always

- block:

  - name: shorter variable name for config
    set_fact:
      config: "{{ roq_bitfinex_config }}"

  - name: install
    include_role:
      name: common
      tasks_from: gateway

  when: "'roq_bitfinex' in group_names"
  tags:
    - roq-bitfinex
