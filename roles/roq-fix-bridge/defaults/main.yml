---

roq_fix_bridge_defaults:
  version: "{{ roq_version }}"
  docker:
    use: "{{ roq_use_docker }}"
    name: "roqtrading/roq-fix-bridge"
  service:
    start: "Sun *-*-* 00:01:00"
    stop: "Sat *-*-* 23:59:00"
  logging:
    verbosity: 0
  flags:
    name: "fix-bridge"
    config_file: "{{ directory_config.usr_local_etc }}/roq-fix-bridge/config.toml"
    client_listen_address: "{{ directory_config.run }}/roq/roq-fix-bridge.sock"
    service_listen_address: "{{ directory_config.run }}/roq/metrics/roq-fix-bridge.sock"
  symbols:
    - ".*"
  users: {}
