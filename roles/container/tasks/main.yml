---
- name: Container
  tags:
    - container
  become: '{{ config_systemd.scope == "system" }}'
  block:
    - name: Create systemd service files
      ansible.builtin.template:
        src: templates/systemd.service
        dest: '{{ config_user.systemd_unit_dir }}/{{ item }}.service'
        mode: 0644
        owner: '{{ "root" if config_systemd.scope == "system" else ansible_user }}'
        group: '{{ "root" if config_systemd.scope == "system" else ansible_user }}'
      with_items: '{{ config_container_services }}'
    - name: Enable/disable systemd services
      ansible.builtin.systemd:
        name: '{{ item }}.service'
        scope: '{{ config_systemd.scope }}'
        enabled: '{{ config_systemd.profiles[config_container.services[item].systemd.profile].enabled }}'
        daemon_reload: true
      with_items: '{{ config_container_services }}'
