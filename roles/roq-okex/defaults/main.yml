---

roq_okex_defaults:
  version: "{{ roq_version }}"
  docker:
    use: "{{ roq_use_docker }}"
    name: "roqtrading/roq-okex"
  service:
    start: "Sun *-*-* 00:01:00"
    stop: "Sat *-*-* 23:59:00"
  logging:
    verbosity: 0
  flags:
    name: "okex"
    config_file: "{{ directory_config.usr_local_etc }}/roq-okex/config.toml"
    event_log_dir: "{{ directory_config.var_lib }}/roq/data"
    client_listen_address: "{{ directory_config.run }}/roq/roq-okex.sock"
    metrics_listen_address: "{{ directory_config.run }}/roq/metrics/roq-okex.sock"
    auth_keys_file: "{{ directory_config.usr_local_etc }}/roq/keys.json"
    auth_cache_dir: "{{ directory_config.var_lib }}"
    rest_uri: "https://www.okex.com"
    ws_public_uri: "wss://ws.okex.com:8443/ws/v5/public"
    ws_private_uri: "wss://ws.okex.com:8443/ws/v5/private"
  symbols:
    - ".*"
