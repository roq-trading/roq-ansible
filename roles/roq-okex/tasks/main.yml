---

- name: combine user configuration with defaults
  set_fact:
    roq_okex_config: >
        {{ roq_okex_defaults | combine(roq_okex | default({}), recursive=True) }}
    cacheable: true
  tags:
    - always

- block:

  - name: shorter variable name for config
    set_fact:
      config: "{{ roq_okex_config }}"

  - name: install
    include_role:
      name: common
      tasks_from: gateway

  when: "'roq_okex' in group_names"
  tags:
    - roq-okex
