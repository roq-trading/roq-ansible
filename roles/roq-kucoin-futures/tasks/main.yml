---

- name: combine user configuration with defaults
  set_fact:
    roq_kucoin_futures_config: >
        {{ roq_kucoin_futures_defaults | combine(roq_kucoin_futures | default({}), recursive=True) }}
    cacheable: true
  tags:
    - always

- block:

  - name: shorter variable name for config
    set_fact:
      config: "{{ roq_kucoin_futures_config }}"

  - name: install
    include_role:
      name: common
      tasks_from: gateway

  when: "'roq_kucoin_futures' in group_names"
  tags:
    - roq-kucoin-futures
