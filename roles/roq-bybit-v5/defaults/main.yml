---

roq_bybit_v5_defaults:
  version: "{{ roq_version }}"
  docker:
    use: "{{ roq_use_docker }}"
    name: "roqtrading/roq-bybit-v5"
  service:
    start: "Sun *-*-* 00:01:00"
    stop: "Sat *-*-* 23:59:00"
  logging:
    verbosity: 0
  flags:
    name: "bybit-v5"
    config_file: "{{ directory_config.usr_local_etc }}/roq/bybit/config.toml"
    event_log_dir: "{{ directory_config.var_lib }}/roq/data"
    client_listen_address: "{{ directory_config.run }}/roq/client/bybit.sock"
    service_listen_address: "{{ directory_config.run }}/roq/service/bybit.sock"
    auth_keys_file: "{{ directory_config.usr_local_etc }}/roq/keys.json"
    cache_dir: "{{ directory_config.var_lib }}/roq/cache"
    rest_uri: "https://api-testnet.bybit.com"
    ws_public_uri: "wss://stream-testnet.bybit.com/v5/public"
    ws_private_uri: "wss://stream-testnet.bybit.com/v5/private"
  symbols:
    - ".*"
