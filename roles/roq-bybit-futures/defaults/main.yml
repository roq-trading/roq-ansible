---

roq_bybit_futures_defaults:
  version: "{{ roq_version }}"
  docker:
    use: "{{ roq_use_docker }}"
    name: "roqtrading/roq-bybit-futures"
  service:
    start: "Sun *-*-* 00:01:00"
    stop: "Sat *-*-* 23:59:00"
  logging:
    verbosity: 0
  flags:
    name: "bybit-futures"
    config_file: "{{ directory_config.usr_local_etc }}/roq-bybit-futures/config.toml"
    event_log_dir: "{{ directory_config.var_lib }}/roq/data"
    client_listen_address: "{{ directory_config.run }}/roq/roq-bybit-futures.sock"
    service_listen_address: "{{ directory_config.run }}/roq/metrics/roq-bybit-futures.sock"
    auth_keys_file: "{{ directory_config.usr_local_etc }}/roq/keys.json"
    cache_dir: "{{ directory_config.var_lib }}/roq/cache"
    rest_uri: "https://api-testnet.bybit.com"
    ws_public_uri: "wss://stream-testnet.bybit.com/realtime_public"
    ws_private_uri: "wss://stream-testnet.bybit.com/realtime_private"
  symbols:
    - ".*"
